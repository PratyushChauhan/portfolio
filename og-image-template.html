<!--
  OG Image Template — 1200x630
  Open this in a browser, set viewport to 1200x630, screenshot.
  Or use: node screenshot-og.js (see below)
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 25%, rgba(0,242,254,0.10) 0%, transparent 30%),
      radial-gradient(circle at 85% 75%, rgba(79,172,254,0.06) 0%, transparent 25%);
  }
  .card {
    width: 1000px;
    padding: 60px 80px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    position: relative;
    z-index: 1;
  }
  .tag {
    display: inline-block;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #00f2fe;
    background: rgba(0,242,254,0.08);
    border: 1px solid rgba(0,242,254,0.20);
    padding: 10px 22px;
    border-radius: 8px;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: #f8f9fa;
    margin-bottom: 20px;
  }
  p {
    font-size: 28px;
    font-weight: 300;
    color: #a0a0a0;
    line-height: 1.5;
    max-width: 720px;
  }
  .footer {
    position: absolute;
    bottom: 50px;
    left: 100px;
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.02em;
  }
  .footer span {
    color: #00f2fe;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <div class="tag">Case Study</div>
    <h1>How Hermes Formats Telegram Messages So Well</h1>
    <p>A deep dive into dual-path rendering, MarkdownV2 conversion, and the engineering decisions behind agent readability.</p>
  </div>
  <div class="footer"><span>P.</span> CHAUHAN</div>
</body>
</html>
